<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>{% block title %}Blogger{% endblock %}</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body class="bg-light d-flex flex-column min-vh-100">
	<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
		<div class="container">
			<div class="d-flex align-items-center gap-3">
				<a class="navbar-brand fw-bold mb-0" href="{% url 'main:home_view' %}">Blogger</a>
				<a class="nav-link text-white" href="{% url 'main:home_view' %}">Home</a>
				<a class="nav-link text-white" href="{% url 'posts:create_post_view' %}">Create Post</a>
			</div>
		</div>
	</nav>

	<main class="container py-5 flex-grow-1">
		{% block content %}{% endblock %}
	</main>

	<footer class="bg-dark text-white-50 py-3">
		<div class="container text-center small">
			&copy; 2026 Blogger. All rights reserved.
		</div>
	</footer>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>

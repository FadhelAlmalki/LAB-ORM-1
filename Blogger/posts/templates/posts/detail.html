{% extends 'main/base.html' %}

{% block title %}{{ post.title }} | Blogger{% endblock %}

{% block content %}
<article class="card shadow-sm border-0">
	<div class="card-body p-4 p-md-5">
		<h1 class="h3 mb-2">{{ post.title }}</h1>
		<p class="text-muted small mb-4">Published on {{ post.published_at|date:"M d, Y H:i" }}</p>
		<div class="mb-4" style="white-space: pre-line;">{{ post.content }}</div>
		<a href="{% url 'main:home_view' %}" class="btn btn-outline-secondary">Back to Latest Posts</a>
	</div>
</article>
{% endblock %}

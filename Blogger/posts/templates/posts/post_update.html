{% extends 'main/base.html' %}

{% block title %}Update Post | Blogger{% endblock %}

{% block content %}
<div class="row justify-content-center">
	<div class="col-12 col-md-8 col-lg-7">
		<div class="card shadow-sm border-0">
			<div class="card-body p-4">
				<h1 class="h4 mb-4">Update Post</h1>

				<form method="post" action="{% url 'posts:update_post_view' post.id %}" enctype="multipart/form-data">
					{% csrf_token %}

					<div class="mb-3">
						<label for="title" class="form-label">Title</label>
						<input type="text" class="form-control" id="title" name="title" value="{{post.title}}" required>
					</div>

					<div class="mb-3">
						<label for="content" class="form-label">Content</label>
						<textarea class="form-control" id="content" name="content" rows="6" required>{{post.content}}</textarea>
					</div>

                    <div class="mb-3">
						{% if post.poster %}
							<img src="{{ post.poster.url }}" class="w-50" alt="{{ post.title }} poster"/>
						{% else %}
							<img src="/media/images/default.jpg" class="w-50" alt="Default poster"/>
						{% endif %}
                    </div>

					<div class="mb-3">
						<label for="poster" class="form-label">Poster Image</label>
						<input type="file" class="form-control" id="poster" name="poster">
					</div>

					<div class="d-flex gap-2">
						<button type="submit" class="btn btn-success">Update Post</button>
						<a href="{% url 'main:home_view' %}" class="btn btn-outline-secondary">Cancel</a>
					</div>
				</form>
			</div>
		</div>
	</div>
</div>
{% endblock %}
